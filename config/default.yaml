camera:
  type: orbbec_gemini2
  serial: null
  color_width: 1280
  color_height: 720
  depth_width: 1280
  depth_height: 720
  fps: 30

calibration:
  aruco:
    marker_length_m: 0.1
    dict_id: 0
    target_marker_id: 0
  hand_eye_method: TSAI

detection:
  conf_threshold: 0.5
  iou_threshold: 0.45

robot:
  repo_root: null
  config_path: null
  urdf_path: null
  pose_convention: xyz_euler_rad
  ready_pose:
    x: 0.3
    y: 0.0
    z: 0.3
    roll: 0.0
    pitch: 0.7
    duration: 3.0

yolo:
  model_name: "yolo11n-seg.engine"
  device: "auto"
  use_world: false
  custom_classes: []

graspnet:
  checkpoint: "checkpoint-rs.tar"

grasp_pipeline:
  infer_every_live: 3
  grasp:
    depth_quantile: 0.6
    pregrasp_offset_m: 0.080
    grasp_forward_offset_m: 0.000
    grasp_lateral_offset_m: 0.000
    grasp_vertical_offset_m: 0.000
    grasp_roll_offset_deg: 0.0
    grasp_pitch_offset_deg: 0.0
    grasp_yaw_offset_deg: 0.0
    camera_x_offset_m: 0.000
    camera_y_offset_m: 0.000
    camera_z_offset_m: 0.000
    camera_roll_offset_deg: 0.0
    camera_pitch_offset_deg: 0.0
    camera_yaw_offset_deg: 0.0
    base_x_offset_m: 0.000
    base_y_offset_m: 0.000
    base_z_offset_m: 0.000
    base_roll_offset_deg: 0.0
    base_pitch_offset_deg: 0.0
    base_yaw_offset_deg: 0.0
  place:
    enabled: true
    base_joint: joint1
    base_delta_deg: 90.0
    base_direction: auto
    base_rotate_duration: 2.5
    base_safety_margin_deg: 5.0
    return_home: true
